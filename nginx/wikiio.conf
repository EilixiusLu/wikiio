# =============================================================================
# Wikiio Nginx — API 反代 + SSL 终端
# 部署于 Docker 网络内部 (wikiio-nginx 容器)，对公网暴露 80/443
# =============================================================================

# ── HTTP (80) — 仅用于 Certbot ACME 验证，其余一律 301 → HTTPS ──
server {
    listen 80;
    server_name api.verniy.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (443) — API 反代 ──
server {
    listen 443 ssl http2;
    server_name api.verniy.site;

    # ---- SSL 证书 ----
    ssl_certificate     /etc/letsencrypt/live/api.verniy.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.verniy.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---- 安全 Header ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ---- Gzip（JSON 响应压缩）----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json text/plain;

    # ---- API 反向代理 ----
    # 使用 Docker 内置 DNS + 变量实现动态解析
    # 避免 backend 容器重启后 Nginx 仍缓存旧 IP 导致 502
    resolver 127.0.0.11 valid=10s ipv6=off;
    location / {
        set $backend "backend:8000";
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
}
