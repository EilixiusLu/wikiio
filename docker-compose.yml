# =============================================================================
# Wikiio Docker Compose — 后端服务编排（前端已迁至 EdgeOne Pages 静态托管）
#
# 服务清单（5 项）:
#   1. postgres      — PostgreSQL 16 数据库
#   2. redis         — Redis 7 缓存 + Celery Broker
#   3. backend       — FastAPI 应用 (:8000)
#   4. celery-worker — Celery 异步任务执行器
#   5. celery-beat   — Celery 定时任务调度器
# =============================================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: wikiio-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: wikiio
      POSTGRES_PASSWORD: wikiio@lck
      POSTGRES_DB: wikiio_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wikiio -d wikiio_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: wikiio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wikiio-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://wikiio:wikiio%40lck@postgres:5432/wikiio_db
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      CORS_ORIGINS: "https://wikiio.verniy.site,http://localhost:5173,http://127.0.0.1:5173"
    volumes:
      - logs:/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wikiio-celery-worker
    restart: unless-stopped
    command: celery -A app.crawler.scheduler worker --loglevel=info -P solo
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://wikiio:wikiio%40lck@postgres:5432/wikiio_db
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    volumes:
      - logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - app-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wikiio-celery-beat
    restart: unless-stopped
    command: celery -A app.crawler.scheduler beat --loglevel=info
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://wikiio:wikiio%40lck@postgres:5432/wikiio_db
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    volumes:
      - logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres_data:
    name: wikiio-postgres-data
  logs:
    name: wikiio-logs

networks:
  app-network:
    name: wikiio-app-network
    driver: bridge
